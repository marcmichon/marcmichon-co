<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="720" rx="32" fill="#F8FAFC"></rect>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.10"></feDropShadow>
    </filter>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2563EB"></stop>
      <stop offset="1" stop-color="#60A5FA"></stop>
    </linearGradient>
  </defs>

  <text x="600" y="70" text-anchor="middle" font-family="Inter, Arial" font-size="34" font-weight="800" fill="#0F172A">
    Transformer la détection en programme de réduction du risque
  </text>

  <text x="600" y="108" text-anchor="middle" font-family="Inter, Arial" font-size="18" fill="#64748B">
    Le scanner produit la donnée. Le programme organise la décision, l'action et le suivi.
  </text>

  <g filter="url(#shadow)">
    <rect x="70" y="260" width="160" height="110" rx="22" fill="white" stroke="#DBEAFE"></rect>
    <text x="150" y="305" text-anchor="middle" font-family="Inter, Arial" font-size="18" font-weight="800" fill="#0F172A">Scan</text>
    <text x="150" y="335" text-anchor="middle" font-family="Inter, Arial" font-size="14" fill="#64748B">Détection</text>

    <rect x="275" y="260" width="175" height="110" rx="22" fill="white" stroke="#DBEAFE"></rect>
    <text x="362" y="305" text-anchor="middle" font-family="Inter, Arial" font-size="18" font-weight="800" fill="#0F172A">Qualification</text>
    <text x="362" y="335" text-anchor="middle" font-family="Inter, Arial" font-size="14" fill="#64748B">Contexte</text>

    <rect x="495" y="240" width="210" height="150" rx="28" fill="url(#blue)"></rect>
    <text x="600" y="302" text-anchor="middle" font-family="Inter, Arial" font-size="24" font-weight="900" fill="white">Programme VM</text>
    <text x="600" y="333" text-anchor="middle" font-family="Inter, Arial" font-size="15" fill="#DBEAFE">Gouvernance • SLA • Owners</text>

    <rect x="750" y="260" width="175" height="110" rx="22" fill="white" stroke="#DBEAFE"></rect>
    <text x="837" y="305" text-anchor="middle" font-family="Inter, Arial" font-size="18" font-weight="800" fill="#0F172A">Remédiation</text>
    <text x="837" y="335" text-anchor="middle" font-family="Inter, Arial" font-size="14" fill="#64748B">Action suivie</text>

    <rect x="970" y="260" width="160" height="110" rx="22" fill="white" stroke="#DBEAFE"></rect>
    <text x="1050" y="305" text-anchor="middle" font-family="Inter, Arial" font-size="18" font-weight="800" fill="#0F172A">KPIs</text>
    <text x="1050" y="335" text-anchor="middle" font-family="Inter, Arial" font-size="14" fill="#64748B">Pilotage</text>
  </g>

  <g stroke="#2563EB" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M235 315H270"></path>
    <path d="M260 305L270 315L260 325"></path>

    <path d="M455 315H490"></path>
    <path d="M480 305L490 315L480 325"></path>

    <path d="M710 315H745"></path>
    <path d="M735 305L745 315L735 325"></path>

    <path d="M930 315H965"></path>
    <path d="M955 305L965 315L955 325"></path>
  </g>

  <g filter="url(#shadow)">
    <rect x="250" y="500" width="700" height="105" rx="26" fill="white" stroke="#E5E7EB"></rect>
    <text x="600" y="540" text-anchor="middle" font-family="Inter, Arial" font-size="16" font-weight="900" fill="#2563EB" letter-spacing="2">
      CAPACITÉS NÉCESSAIRES
    </text>

    <g font-family="Inter, Arial" font-size="15" font-weight="800">
      <rect x="300" y="565" width="120" height="34" rx="17" fill="#EFF6FF"></rect>
      <text x="360" y="587" text-anchor="middle" fill="#2563EB">Owners</text>

      <rect x="440" y="565" width="95" height="34" rx="17" fill="#EFF6FF"></rect>
      <text x="487" y="587" text-anchor="middle" fill="#2563EB">SLA</text>

      <rect x="555" y="565" width="115" height="34" rx="17" fill="#EFF6FF"></rect>
      <text x="612" y="587" text-anchor="middle" fill="#2563EB">KPIs</text>

      <rect x="690" y="565" width="160" height="34" rx="17" fill="#EFF6FF"></rect>
      <text x="770" y="587" text-anchor="middle" fill="#2563EB">Gouvernance</text>
    </g>
  </g>

  <path d="M600 395V495" stroke="#2563EB" stroke-width="3" stroke-dasharray="8 8"></path>
</svg>