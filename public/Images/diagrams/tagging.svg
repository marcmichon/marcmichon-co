<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="720" rx="32" fill="#F8FAFC"></rect>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.10"></feDropShadow>
    </filter>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2563EB"></stop>
      <stop offset="1" stop-color="#60A5FA"></stop>
    </linearGradient>
  </defs>

  <text x="600" y="70" text-anchor="middle" font-family="Inter, Arial" font-size="34" font-weight="800" fill="#0F172A">
    Du scan technique à la décision opérationnelle
  </text>

  <text x="600" y="108" text-anchor="middle" font-family="Inter, Arial" font-size="18" fill="#64748B">
    Le tagging transforme une donnée brute en contexte exploitable
  </text>

  <!-- Main flow boxes -->
  <g filter="url(#shadow)">
    <rect x="70" y="250" width="170" height="110" rx="22" fill="white" stroke="#DBEAFE"></rect>
    <text x="155" y="295" text-anchor="middle" font-family="Inter, Arial" font-size="18" font-weight="800" fill="#0F172A">Scanner</text>
    <text x="155" y="325" text-anchor="middle" font-family="Inter, Arial" font-size="14" fill="#64748B">Détection</text>

    <rect x="290" y="250" width="190" height="110" rx="22" fill="white" stroke="#DBEAFE"></rect>
    <text x="385" y="295" text-anchor="middle" font-family="Inter, Arial" font-size="18" font-weight="800" fill="#0F172A">Vulnérabilités</text>
    <text x="385" y="325" text-anchor="middle" font-family="Inter, Arial" font-size="14" fill="#64748B">Donnée brute</text>

    <rect x="530" y="235" width="210" height="140" rx="26" fill="url(#blue)"></rect>
    <text x="635" y="296" text-anchor="middle" font-family="Inter, Arial" font-size="24" font-weight="900" fill="white">Tagging</text>
    <text x="635" y="326" text-anchor="middle" font-family="Inter, Arial" font-size="15" fill="#DBEAFE">Contexte métier</text>

    <rect x="790" y="250" width="170" height="110" rx="22" fill="white" stroke="#DBEAFE"></rect>
    <text x="875" y="295" text-anchor="middle" font-family="Inter, Arial" font-size="18" font-weight="800" fill="#0F172A">Priorisation</text>
    <text x="875" y="325" text-anchor="middle" font-family="Inter, Arial" font-size="14" fill="#64748B">Décision</text>

    <rect x="1010" y="250" width="170" height="110" rx="22" fill="white" stroke="#DBEAFE"></rect>
    <text x="1095" y="295" text-anchor="middle" font-family="Inter, Arial" font-size="18" font-weight="800" fill="#0F172A">Remédiation</text>
    <text x="1095" y="325" text-anchor="middle" font-family="Inter, Arial" font-size="14" fill="#64748B">Action</text>
  </g>

  <!-- arrows -->
  <path d="M245 305H285" stroke="#2563EB" stroke-width="4" stroke-linecap="round"></path>
  <path d="M275 295L285 305L275 315" stroke="#2563EB" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>

  <path d="M485 305H525" stroke="#2563EB" stroke-width="4" stroke-linecap="round"></path>
  <path d="M515 295L525 305L515 315" stroke="#2563EB" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>

  <path d="M745 305H785" stroke="#2563EB" stroke-width="4" stroke-linecap="round"></path>
  <path d="M775 295L785 305L775 315" stroke="#2563EB" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>

  <path d="M965 305H1005" stroke="#2563EB" stroke-width="4" stroke-linecap="round"></path>
  <path d="M995 295L1005 305L995 315" stroke="#2563EB" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>

  <!-- tag dimensions -->
  <g filter="url(#shadow)">
    <rect x="260" y="470" width="680" height="130" rx="28" fill="white" stroke="#E5E7EB"></rect>
    <text x="600" y="510" text-anchor="middle" font-family="Inter, Arial" font-size="16" font-weight="900" fill="#2563EB" letter-spacing="2">
      DIMENSIONS DE CONTEXTE
    </text>

    <g font-family="Inter, Arial" font-size="15" font-weight="800">
      <rect x="305" y="540" width="120" height="38" rx="19" fill="#EFF6FF"></rect>
      <text x="365" y="565" text-anchor="middle" fill="#2563EB">Application</text>

      <rect x="445" y="540" width="100" height="38" rx="19" fill="#EFF6FF"></rect>
      <text x="495" y="565" text-anchor="middle" fill="#2563EB">Owner</text>

      <rect x="565" y="540" width="140" height="38" rx="19" fill="#EFF6FF"></rect>
      <text x="635" y="565" text-anchor="middle" fill="#2563EB">Environnement</text>

      <rect x="725" y="540" width="110" height="38" rx="19" fill="#EFF6FF"></rect>
      <text x="780" y="565" text-anchor="middle" fill="#2563EB">Criticité</text>
    </g>
  </g>

  <path d="M635 382V465" stroke="#2563EB" stroke-width="3" stroke-dasharray="8 8"></path>
</svg>