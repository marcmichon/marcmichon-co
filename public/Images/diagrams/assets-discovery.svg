    <text x="600" y="340" text-anchor="middle" font-family="Inter, Arial" font-size="30" font-weight="900" fill="white">Inventaire sécurité</text>
    <text x="600" y="375" text-anchor="middle" font-family="Inter, Arial" font-size="17" fill="#DBEAFE">Vue consolidée du patrimoine réel</text>
    <text x="600" y="420" text-anchor="middle" font-family="Inter, Arial" font-size="15" fill="#EFF6FF">Identifier • Qualifier • Prioriser • Remédier</text>
