    <text x="1025" y="365" text-anchor="middle" font-family="Inter, Arial" font-size="18" font-weight="800" fill="#0F172A">Cloud</text>
    <text x="1025" y="392" text-anchor="middle" font-family="Inter, Arial" font-size="14" fill="#64748B">Ressources éphémères</text>

    <rect x="930" y="450" width="190" height="86" rx="22" fill="white" stroke="#DBEAFE"></rect>
