    <text x="175" y="512" text-anchor="middle" font-family="Inter, Arial" font-size="14" fill="#64748B">Machines protégées</text>

    <rect x="930" y="210" width="190" height="86" rx="22" fill="white" stroke="#DBEAFE"></rect>
    <text x="1025" y="245" text-anchor="middle" font-family="Inter, Arial" font-size="18" font-weight="800" fill="#0F172A">DHCP</text>
    <text x="1025" y="272" text-anchor="middle" font-family="Inter, Arial" font-size="14" fill="#64748B">Équipements vus</text>

